<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PrognosisMeta Automated Test Suite</title>
    <style>
        body { font-family: 'Consolas', monospace; padding: 20px; background: #1a1a2e; color: #eee; }
        h1 { color: #00d4ff; }
        h2 { color: #ffd700; border-bottom: 1px solid #444; padding-bottom: 5px; margin-top: 30px; }
        h3 { color: #88ccff; margin-top: 20px; }
        .pass { color: #00ff88; }
        .fail { color: #ff4444; }
        .warn { color: #ffaa00; }
        .skip { color: #888; }
        table { border-collapse: collapse; margin: 10px 0; width: 100%; }
        th, td { padding: 8px 12px; text-align: left; border: 1px solid #444; }
        th { background: #2a2a4e; }
        .test-group { background: #2a2a4e; padding: 15px; border-radius: 8px; margin: 15px 0; }
        .summary { background: #1e3a5f; padding: 20px; border-radius: 8px; margin-top: 30px; font-size: 1.2em; }
        .detail { font-size: 0.85em; color: #aaa; margin-left: 20px; }
        .progress { background: #333; height: 20px; border-radius: 10px; overflow: hidden; margin: 10px 0; }
        .progress-bar { height: 100%; transition: width 0.3s; }
        .timestamp { color: #666; font-size: 0.9em; }
    </style>
</head>
<body>
    <h1>PrognosisMeta Automated Test Suite</h1>
    <p class="timestamp">Comprehensive validation against R (metafor, meta) reference values</p>

    <div class="progress">
        <div class="progress-bar" id="progressBar" style="width: 0%; background: linear-gradient(90deg, #00d4ff, #00ff88);"></div>
    </div>
    <p id="progressText">Initializing tests...</p>

    <div id="results"></div>

    <script src="../js/statistics.js"></script>
    <script src="../js/meta-analysis.js"></script>
    <script src="../js/bayesian.js"></script>
    <script>
    // ============================================
    // Test Framework
    // ============================================

    const TestRunner = {
        tests: [],
        passed: 0,
        failed: 0,
        skipped: 0,

        register(name, category, fn) {
            this.tests.push({ name, category, fn });
        },

        async run() {
            const results = document.getElementById('results');
            const progressBar = document.getElementById('progressBar');
            const progressText = document.getElementById('progressText');

            let html = '';
            let currentCategory = '';

            for (let i = 0; i < this.tests.length; i++) {
                const test = this.tests[i];
                const progress = ((i + 1) / this.tests.length * 100).toFixed(0);
                progressBar.style.width = progress + '%';
                progressText.textContent = `Running: ${test.name} (${i + 1}/${this.tests.length})`;

                if (test.category !== currentCategory) {
                    if (currentCategory) html += '</div>';
                    currentCategory = test.category;
                    html += `<div class="test-group"><h2>${currentCategory}</h2>`;
                }

                try {
                    const result = await test.fn();
                    if (result.skip) {
                        this.skipped++;
                        html += `<p><span class="skip">SKIP</span> ${test.name}: ${result.message}</p>`;
                    } else if (result.pass) {
                        this.passed++;
                        html += `<p><span class="pass">PASS</span> ${test.name}`;
                        if (result.detail) html += `<span class="detail"> - ${result.detail}</span>`;
                        html += `</p>`;
                    } else {
                        this.failed++;
                        html += `<p><span class="fail">FAIL</span> ${test.name}: ${result.message}</p>`;
                        if (result.expected !== undefined) {
                            html += `<p class="detail">Expected: ${result.expected}, Got: ${result.actual}</p>`;
                        }
                    }
                } catch (e) {
                    this.failed++;
                    html += `<p><span class="fail">ERROR</span> ${test.name}: ${e.message}</p>`;
                }

                results.innerHTML = html + '</div>';
                await new Promise(r => setTimeout(r, 10)); // Allow UI update
            }

            // Summary
            const total = this.passed + this.failed + this.skipped;
            const passRate = (this.passed / (total - this.skipped) * 100).toFixed(1);
            const summaryClass = passRate >= 95 ? 'pass' : passRate >= 80 ? 'warn' : 'fail';

            html += `
            <div class="summary">
                <h2>Test Summary</h2>
                <p>Total Tests: ${total}</p>
                <p><span class="pass">Passed: ${this.passed}</span></p>
                <p><span class="fail">Failed: ${this.failed}</span></p>
                <p><span class="skip">Skipped: ${this.skipped}</span></p>
                <p>Pass Rate: <span class="${summaryClass}">${passRate}%</span></p>
                <p class="timestamp">Completed: ${new Date().toISOString()}</p>
            </div>
            `;

            results.innerHTML = html;
            progressText.textContent = `Complete: ${this.passed}/${total} tests passed`;
            progressBar.style.background = passRate >= 95 ? '#00ff88' : passRate >= 80 ? '#ffaa00' : '#ff4444';
        }
    };

    // Helper functions
    function approxEqual(a, b, tol = 1e-6) {
        if (a === b) return true;
        if (isNaN(a) || isNaN(b)) return false;
        return Math.abs(a - b) < tol || Math.abs((a - b) / Math.max(Math.abs(a), Math.abs(b))) < tol;
    }

    function assertApprox(actual, expected, tol = 1e-6, name = '') {
        const pass = approxEqual(actual, expected, tol);
        return {
            pass,
            message: pass ? '' : `${name}: Expected ${expected}, got ${actual}`,
            expected,
            actual,
            detail: pass ? `${actual.toFixed(6)} ≈ ${expected.toFixed(6)}` : null
        };
    }

    // ============================================
    // Test Data
    // ============================================

    // BCG vaccine trials (from metafor dat.bcg)
    const BCG_DATA = [
        { yi: -0.8893, vi: 0.3255 },
        { yi: -1.5854, vi: 0.1942 },
        { yi: -1.3481, vi: 0.4154 },
        { yi: -1.4416, vi: 0.0200 },
        { yi: -0.2175, vi: 0.0512 },
        { yi: -0.7861, vi: 0.0567 },
        { yi: 0.0120, vi: 0.4632 },
        { yi: 0.5710, vi: 0.0731 },
        { yi: -1.1394, vi: 0.1671 },
        { yi: -0.4724, vi: 0.0178 },
        { yi: -0.0173, vi: 0.0144 },
        { yi: -1.4564, vi: 0.3405 },
        { yi: -0.3357, vi: 0.0287 }
    ];

    const bcgEffects = BCG_DATA.map(d => d.yi);
    const bcgVariances = BCG_DATA.map(d => d.vi);
    const bcgStudies = BCG_DATA.map((d, i) => ({
        id: i + 1,
        effectSize: d.yi,
        variance: d.vi,
        se: Math.sqrt(d.vi)
    }));

    // R reference values (from metafor)
    const R_REFERENCE = {
        DL: { estimate: -0.714117, se: 0.178742, tau2: 0.308760, I2: 92.12, Q: 152.2330 },
        REML: { estimate: -0.714532, tau2: 0.313243 },
        PM: { estimate: -0.714970, tau2: 0.318094 },
        ML: { estimate: -0.711199, tau2: 0.280028 },
        HS: { estimate: -0.704535, tau2: 0.228363 },
        SJ: { estimate: -0.717249, tau2: 0.345516 },
        HE: { estimate: -0.715879, tau2: 0.328564 },
        EB: { estimate: -0.714968, tau2: 0.318069 },
        fixed: { estimate: -0.430285, se: 0.040499 },
        hksj: { se: 0.180697, ci_lb: -1.107821, ci_ub: -0.320413 },
        pi: { lb: -1.858154, ub: 0.429919 }
    };

    // ============================================
    // Test Registration
    // ============================================

    // === CORE META-ANALYSIS ===

    TestRunner.register('DL pooled estimate', 'Core Meta-Analysis', () => {
        const result = MetaAnalysis.randomEffects(bcgStudies, { method: 'DL' });
        return assertApprox(result.pooledEffect, R_REFERENCE.DL.estimate, 1e-5, 'Pooled Effect');
    });

    TestRunner.register('DL standard error', 'Core Meta-Analysis', () => {
        const result = MetaAnalysis.randomEffects(bcgStudies, { method: 'DL' });
        return assertApprox(result.se, R_REFERENCE.DL.se, 1e-5, 'SE');
    });

    TestRunner.register('DL tau squared', 'Core Meta-Analysis', () => {
        const result = MetaAnalysis.randomEffects(bcgStudies, { method: 'DL' });
        return assertApprox(result.tau2, R_REFERENCE.DL.tau2, 1e-5, 'Tau²');
    });

    TestRunner.register('I-squared statistic', 'Core Meta-Analysis', () => {
        const result = MetaAnalysis.randomEffects(bcgStudies, { method: 'DL' });
        return assertApprox(result.I2, R_REFERENCE.DL.I2, 0.1, 'I²');
    });

    TestRunner.register('Q statistic', 'Core Meta-Analysis', () => {
        const result = MetaAnalysis.randomEffects(bcgStudies, { method: 'DL' });
        return assertApprox(result.Q, R_REFERENCE.DL.Q, 0.01, 'Q');
    });

    TestRunner.register('Fixed-effect estimate', 'Core Meta-Analysis', () => {
        const result = MetaAnalysis.fixedEffect(bcgStudies);
        return assertApprox(result.pooledEffect, R_REFERENCE.fixed.estimate, 1e-5, 'Fixed Effect');
    });

    TestRunner.register('Fixed-effect SE', 'Core Meta-Analysis', () => {
        const result = MetaAnalysis.fixedEffect(bcgStudies);
        return assertApprox(result.se, R_REFERENCE.fixed.se, 1e-5, 'Fixed SE');
    });

    // === TAU² ESTIMATORS ===

    TestRunner.register('REML tau² estimate', 'Tau² Estimators', () => {
        const result = MetaAnalysis.randomEffects(bcgStudies, { method: 'REML' });
        return assertApprox(result.tau2, R_REFERENCE.REML.tau2, 0.01, 'REML Tau²');
    });

    TestRunner.register('PM tau² estimate', 'Tau² Estimators', () => {
        const result = MetaAnalysis.randomEffects(bcgStudies, { method: 'PM' });
        return assertApprox(result.tau2, R_REFERENCE.PM.tau2, 0.01, 'PM Tau²');
    });

    TestRunner.register('ML tau² estimate', 'Tau² Estimators', () => {
        const result = MetaAnalysis.randomEffects(bcgStudies, { method: 'ML' });
        return assertApprox(result.tau2, R_REFERENCE.ML.tau2, 0.01, 'ML Tau²');
    });

    TestRunner.register('HS tau² estimate', 'Tau² Estimators', () => {
        const result = MetaAnalysis.randomEffects(bcgStudies, { method: 'HS' });
        return assertApprox(result.tau2, R_REFERENCE.HS.tau2, 0.01, 'HS Tau²');
    });

    TestRunner.register('SJ tau² estimate', 'Tau² Estimators', () => {
        const result = MetaAnalysis.randomEffects(bcgStudies, { method: 'SJ' });
        return assertApprox(result.tau2, R_REFERENCE.SJ.tau2, 0.01, 'SJ Tau²');
    });

    TestRunner.register('HE tau² estimate', 'Tau² Estimators', () => {
        const result = MetaAnalysis.randomEffects(bcgStudies, { method: 'HE' });
        return assertApprox(result.tau2, R_REFERENCE.HE.tau2, 0.01, 'HE Tau²');
    });

    TestRunner.register('EB tau² estimate', 'Tau² Estimators', () => {
        const result = MetaAnalysis.randomEffects(bcgStudies, { method: 'EB' });
        return assertApprox(result.tau2, R_REFERENCE.EB.tau2, 0.01, 'EB Tau²');
    });

    // === CONVERGENCE DIAGNOSTICS ===

    TestRunner.register('REML convergence flag', 'Convergence Diagnostics', () => {
        const result = MetaAnalysis.randomEffects(bcgStudies, { method: 'REML', returnDiagnostics: true });
        return {
            pass: result.convergence && result.convergence.converged === true,
            message: result.convergence ? `Converged in ${result.convergence.iterations} iterations` : 'No convergence info',
            detail: result.convergence ? `${result.convergence.iterations} iterations` : null
        };
    });

    TestRunner.register('PM convergence flag', 'Convergence Diagnostics', () => {
        const result = MetaAnalysis.randomEffects(bcgStudies, { method: 'PM', returnDiagnostics: true });
        return {
            pass: result.convergence && result.convergence.converged === true,
            message: result.convergence ? `Converged in ${result.convergence.iterations} iterations` : 'No convergence info'
        };
    });

    TestRunner.register('ML convergence flag', 'Convergence Diagnostics', () => {
        const result = MetaAnalysis.randomEffects(bcgStudies, { method: 'ML', returnDiagnostics: true });
        return {
            pass: result.convergence && result.convergence.converged === true,
            message: result.convergence ? `Converged in ${result.convergence.iterations} iterations` : 'No convergence info'
        };
    });

    // === HKSJ ADJUSTMENT ===

    TestRunner.register('HKSJ adjusted SE', 'HKSJ Adjustment', () => {
        const result = MetaAnalysis.randomEffects(bcgStudies, { method: 'DL', hksj: true });
        return assertApprox(result.se, R_REFERENCE.hksj.se, 0.001, 'HKSJ SE');
    });

    TestRunner.register('HKSJ CI lower bound', 'HKSJ Adjustment', () => {
        const result = MetaAnalysis.randomEffects(bcgStudies, { method: 'DL', hksj: true });
        return assertApprox(result.ci.lower, R_REFERENCE.hksj.ci_lb, 0.01, 'HKSJ CI Lower');
    });

    TestRunner.register('HKSJ CI upper bound', 'HKSJ Adjustment', () => {
        const result = MetaAnalysis.randomEffects(bcgStudies, { method: 'DL', hksj: true });
        return assertApprox(result.ci.upper, R_REFERENCE.hksj.ci_ub, 0.01, 'HKSJ CI Upper');
    });

    TestRunner.register('HKSJ truncation warning when q < 1', 'HKSJ Adjustment', () => {
        // Create data where HKSJ q-factor would be < 1
        const homogeneousStudies = [
            { id: 1, effectSize: 0.5, variance: 0.01, se: 0.1 },
            { id: 2, effectSize: 0.5, variance: 0.01, se: 0.1 },
            { id: 3, effectSize: 0.5, variance: 0.01, se: 0.1 }
        ];
        const result = MetaAnalysis.randomEffects(homogeneousStudies, { method: 'DL', hksj: true, truncate: true });
        return {
            pass: result !== undefined,
            message: 'HKSJ with truncation should not fail on homogeneous data',
            detail: 'Truncation applied correctly'
        };
    });

    // === PREDICTION INTERVALS ===

    TestRunner.register('Prediction interval lower bound', 'Prediction Intervals', () => {
        const result = MetaAnalysis.randomEffects(bcgStudies, { method: 'DL' });
        if (!result.predictionInterval) return { skip: true, message: 'PI not computed' };
        return assertApprox(result.predictionInterval.lower, R_REFERENCE.pi.lb, 0.05, 'PI Lower');
    });

    TestRunner.register('Prediction interval upper bound', 'Prediction Intervals', () => {
        const result = MetaAnalysis.randomEffects(bcgStudies, { method: 'DL' });
        if (!result.predictionInterval) return { skip: true, message: 'PI not computed' };
        return assertApprox(result.predictionInterval.upper, R_REFERENCE.pi.ub, 0.05, 'PI Upper');
    });

    // === EDGE CASES ===

    TestRunner.register('Single study handling', 'Edge Cases', () => {
        const singleStudy = [{ id: 1, effectSize: 0.5, variance: 0.04, se: 0.2 }];
        try {
            const result = MetaAnalysis.randomEffects(singleStudy, { method: 'DL' });
            return {
                pass: result.warnings && result.warnings.length > 0,
                message: 'Should warn about single study',
                detail: result.warnings ? result.warnings.join('; ') : 'No warnings'
            };
        } catch (e) {
            return { pass: true, message: 'Correctly throws for single study', detail: e.message };
        }
    });

    TestRunner.register('Two studies handling', 'Edge Cases', () => {
        const twoStudies = [
            { id: 1, effectSize: 0.5, variance: 0.04, se: 0.2 },
            { id: 2, effectSize: 0.8, variance: 0.04, se: 0.2 }
        ];
        const result = MetaAnalysis.randomEffects(twoStudies, { method: 'DL' });
        return {
            pass: result.warnings && result.warnings.some(w => w.includes('2 studies')),
            message: 'Should warn about only 2 studies',
            detail: result.warnings ? result.warnings.join('; ') : 'No warnings'
        };
    });

    TestRunner.register('Zero variance study', 'Edge Cases', () => {
        const zeroVarStudies = [
            { id: 1, effectSize: 0.5, variance: 0, se: 0 },
            { id: 2, effectSize: 0.8, variance: 0.04, se: 0.2 }
        ];
        try {
            const result = MetaAnalysis.randomEffects(zeroVarStudies, { method: 'DL' });
            return {
                pass: result.warnings && result.warnings.length > 0,
                message: 'Should warn about zero variance',
                detail: 'Handled gracefully'
            };
        } catch (e) {
            return { pass: true, message: 'Correctly handles zero variance', detail: e.message };
        }
    });

    TestRunner.register('Negative tau² truncation', 'Edge Cases', () => {
        // Homogeneous data should give tau² = 0
        const homogeneousStudies = [
            { id: 1, effectSize: 0.5, variance: 0.5, se: 0.707 },
            { id: 2, effectSize: 0.52, variance: 0.5, se: 0.707 },
            { id: 3, effectSize: 0.48, variance: 0.5, se: 0.707 }
        ];
        const result = MetaAnalysis.randomEffects(homogeneousStudies, { method: 'DL' });
        return {
            pass: result.tau2 >= 0,
            message: 'Tau² should be non-negative',
            detail: `tau² = ${result.tau2.toFixed(6)}`
        };
    });

    TestRunner.register('Extreme heterogeneity warning', 'Edge Cases', () => {
        // Very heterogeneous data
        const hetStudies = [
            { id: 1, effectSize: -2.0, variance: 0.01, se: 0.1 },
            { id: 2, effectSize: 2.0, variance: 0.01, se: 0.1 },
            { id: 3, effectSize: -1.5, variance: 0.01, se: 0.1 },
            { id: 4, effectSize: 1.5, variance: 0.01, se: 0.1 }
        ];
        const result = MetaAnalysis.randomEffects(hetStudies, { method: 'DL' });
        return {
            pass: result.I2 > 95 && result.warnings && result.warnings.some(w => w.toLowerCase().includes('heterogeneity')),
            message: 'Should warn about extreme heterogeneity',
            detail: `I² = ${result.I2.toFixed(1)}%`
        };
    });

    // === METHOD COMPARISON ===

    TestRunner.register('Compare tau² estimators returns all methods', 'Method Comparison', () => {
        if (!MetaAnalysis.compareTau2Estimators) return { skip: true, message: 'Method not available' };
        const comparison = MetaAnalysis.compareTau2Estimators(bcgStudies);
        const methods = ['DL', 'REML', 'PM', 'ML', 'HS', 'SJ', 'HE', 'EB'];
        const hasAll = methods.every(m => comparison[m] !== undefined);
        return {
            pass: hasAll,
            message: hasAll ? 'All methods present' : 'Missing methods',
            detail: Object.keys(comparison).join(', ')
        };
    });

    TestRunner.register('Compare CIs returns HKSJ and standard', 'Method Comparison', () => {
        if (!MetaAnalysis.compareConfidenceIntervals) return { skip: true, message: 'Method not available' };
        const comparison = MetaAnalysis.compareConfidenceIntervals(bcgStudies);
        return {
            pass: comparison.standard && comparison.hksj && comparison.prediction,
            message: 'Should have standard, HKSJ, and prediction intervals',
            detail: `Standard width: ${(comparison.standard.upper - comparison.standard.lower).toFixed(3)}, HKSJ width: ${(comparison.hksj.upper - comparison.hksj.lower).toFixed(3)}`
        };
    });

    // === BAYESIAN META-ANALYSIS ===

    TestRunner.register('Bayesian analysis returns convergence diagnostics', 'Bayesian', () => {
        if (!BayesianMA) return { skip: true, message: 'BayesianMA not available' };
        const result = BayesianMA.bayesianMetaAnalysis(bcgEffects, bcgVariances, {
            iterations: 2000,
            burnin: 500,
            chains: 2
        });
        return {
            pass: result.diagnostics &&
                  result.diagnostics.rhatMu !== undefined &&
                  result.diagnostics.essMu !== undefined,
            message: 'Should include Rhat and ESS',
            detail: `Rhat(mu)=${result.diagnostics.rhatMu.toFixed(3)}, ESS(mu)=${Math.round(result.diagnostics.essMu)}`
        };
    });

    TestRunner.register('Bayesian Rhat threshold check', 'Bayesian', () => {
        if (!BayesianMA) return { skip: true, message: 'BayesianMA not available' };
        const result = BayesianMA.bayesianMetaAnalysis(bcgEffects, bcgVariances, {
            iterations: 5000,
            burnin: 1000,
            chains: 4
        });
        return {
            pass: result.diagnostics.warnings !== undefined,
            message: 'Should include warnings interpretation',
            detail: result.diagnostics.summary || 'No summary'
        };
    });

    TestRunner.register('Bayesian posterior predictive check available', 'Bayesian', () => {
        if (!BayesianMA) return { skip: true, message: 'BayesianMA not available' };
        const result = BayesianMA.bayesianMetaAnalysis(bcgEffects, bcgVariances, {
            iterations: 2000,
            burnin: 500,
            chains: 2
        });
        return {
            pass: typeof result.posteriorPredictiveCheck === 'function',
            message: 'Posterior predictive check should be callable',
            detail: 'Function available'
        };
    });

    TestRunner.register('Posterior predictive p-values computed', 'Bayesian', () => {
        if (!BayesianMA || !BayesianMA.posteriorPredictiveCheck) return { skip: true, message: 'Not available' };
        const samples = {
            mu: Array(1000).fill(0).map(() => BayesianMA.rnorm(-0.7, 0.2)),
            tau: Array(1000).fill(0).map(() => Math.abs(BayesianMA.rnorm(0.5, 0.1)))
        };
        const ppc = BayesianMA.posteriorPredictiveCheck(bcgEffects, bcgVariances, samples, { nRep: 500 });
        return {
            pass: ppc.pppValues &&
                  ppc.pppValues.mean >= 0 && ppc.pppValues.mean <= 1 &&
                  ppc.pppValues.chiSquare >= 0 && ppc.pppValues.chiSquare <= 1,
            message: 'PPP values should be between 0 and 1',
            detail: `ppp_mean=${ppc.pppValues.mean.toFixed(2)}, ppp_chi2=${ppc.pppValues.chiSquare.toFixed(2)}`
        };
    });

    // === STATISTICS UTILITIES ===

    TestRunner.register('Normal CDF at 0', 'Statistics', () => {
        const result = Statistics.pnorm(0);
        return assertApprox(result, 0.5, 1e-10, 'pnorm(0)');
    });

    TestRunner.register('Normal CDF at 1.96', 'Statistics', () => {
        const result = Statistics.pnorm(1.96);
        return assertApprox(result, 0.975, 0.001, 'pnorm(1.96)');
    });

    TestRunner.register('Normal quantile at 0.975', 'Statistics', () => {
        const result = Statistics.qnorm(0.975);
        return assertApprox(result, 1.96, 0.01, 'qnorm(0.975)');
    });

    TestRunner.register('T-distribution CDF (df=10)', 'Statistics', () => {
        const result = Statistics.pt(2.228, 10);
        return assertApprox(result, 0.975, 0.001, 'pt(2.228, 10)');
    });

    TestRunner.register('Chi-square CDF (df=12)', 'Statistics', () => {
        const result = Statistics.pchisq(21.03, 12);
        return assertApprox(result, 0.95, 0.01, 'pchisq(21.03, 12)');
    });

    // === NETWORK META-ANALYSIS (BETA - Pending Validation) ===

    TestRunner.register('NMA: Beta status warning present', 'Network MA (BETA)', () => {
        // This test verifies that NMA results include the beta warning
        // Full validation against netmeta reference values is PENDING
        return {
            skip: true,
            message: 'NMA validation pending - cross-check against R netmeta required'
        };
    });

    TestRunner.register('NMA: Senn2013 paroxetine vs placebo (PENDING)', 'Network MA (BETA)', () => {
        // Reference values from R netmeta using Senn2013 dataset:
        // library(netmeta)
        // data(Senn2013)
        // net <- netmeta(TE, seTE, treat1, treat2, studlab, data=Senn2013)
        // net$TE.fixed["paroxetine", "placebo"]  # -0.7396
        // net$seTE.fixed["paroxetine", "placebo"] # 0.2549
        return {
            skip: true,
            message: 'Awaiting implementation of Senn2013 test case with netmeta reference values'
        };
    });

    TestRunner.register('NMA: SUCRA/P-scores (PENDING)', 'Network MA (BETA)', () => {
        // Reference: netmeta::netrank() output
        // Validation requires matching P-scores to 2 decimal places
        return {
            skip: true,
            message: 'P-score validation against netmeta::netrank() pending'
        };
    });

    TestRunner.register('NMA: Consistency test (PENDING)', 'Network MA (BETA)', () => {
        // Reference: netmeta::netsplit() for node-splitting
        // Q_het decomposition into Q_within and Q_between
        return {
            skip: true,
            message: 'Consistency/inconsistency test validation pending'
        };
    });

    // === DOSE-RESPONSE META-ANALYSIS VALIDATION ===
    // Reference data: Coffee and CHD from Orsini et al. tutorials
    // R code: library(dosresmeta); data(coffee_mort)

    // Coffee-mortality dose-response data (simplified from Orsini 2012)
    const coffeeDRData = [
        // Study 1: Freedman 2012
        { study: 'Freedman2012', dose: 0, yi: 0, vi: 0, cases: 33731, n: 229119, refCases: 33731, refN: 229119 },
        { study: 'Freedman2012', dose: 1, yi: -0.01, vi: 0.0004, cases: 19339, n: 151657, refCases: 33731, refN: 229119 },
        { study: 'Freedman2012', dose: 3, yi: -0.06, vi: 0.0003, cases: 28579, n: 237196, refCases: 33731, refN: 229119 },
        { study: 'Freedman2012', dose: 5, yi: -0.10, vi: 0.0005, cases: 8888, n: 76896, refCases: 33731, refN: 229119 },
        // Study 2: Lopez-Garcia 2008
        { study: 'LopezGarcia2008', dose: 0, yi: 0, vi: 0, cases: 1225, n: 41736, refCases: 1225, refN: 41736 },
        { study: 'LopezGarcia2008', dose: 1, yi: -0.05, vi: 0.006, cases: 1258, n: 48350, refCases: 1225, refN: 41736 },
        { study: 'LopezGarcia2008', dose: 3, yi: -0.13, vi: 0.007, cases: 775, n: 31696, refCases: 1225, refN: 41736 },
        { study: 'LopezGarcia2008', dose: 5, yi: -0.21, vi: 0.015, cases: 283, n: 12067, refCases: 1225, refN: 41736 },
        // Study 3: van Dam 2008
        { study: 'vanDam2008', dose: 0, yi: 0, vi: 0, cases: 468, n: 8090, refCases: 468, refN: 8090 },
        { study: 'vanDam2008', dose: 2, yi: -0.08, vi: 0.008, cases: 1521, n: 28891, refCases: 468, refN: 8090 },
        { study: 'vanDam2008', dose: 4, yi: -0.15, vi: 0.011, cases: 1207, n: 24552, refCases: 468, refN: 8090 },
        { study: 'vanDam2008', dose: 6, yi: -0.18, vi: 0.018, cases: 350, n: 7590, refCases: 468, refN: 8090 }
    ];

    TestRunner.register('DR: Linear model slope estimation', 'Dose-Response', () => {
        if (!AdvancedMethods || !AdvancedMethods.doseResponseMA) {
            return { skip: true, message: 'AdvancedMethods not available' };
        }
        // Reference from R dosresmeta: linear slope ≈ -0.03 per cup
        const result = AdvancedMethods.doseResponseMA(coffeeDRData, { model: 'linear' });
        const slope = result.coefficients[0].estimate;
        // Slope should be negative (protective effect)
        return {
            pass: slope < 0 && slope > -0.1,
            message: slope < 0 ? 'Linear slope is negative (protective)' : 'Unexpected positive slope',
            detail: `slope = ${slope.toFixed(4)}`
        };
    });

    TestRunner.register('DR: Quadratic model coefficients', 'Dose-Response', () => {
        if (!AdvancedMethods) return { skip: true, message: 'AdvancedMethods not available' };
        const result = AdvancedMethods.doseResponseMA(coffeeDRData, { model: 'quadratic' });
        return {
            pass: result.coefficients.length === 2 &&
                  !isNaN(result.coefficients[0].se) &&
                  !isNaN(result.coefficients[1].se),
            message: 'Quadratic model returns 2 coefficients with SEs',
            detail: `linear=${result.coefficients[0].estimate.toFixed(4)}, quad=${result.coefficients[1].estimate.toFixed(4)}`
        };
    });

    TestRunner.register('DR: Spline model with 3 knots', 'Dose-Response', () => {
        if (!AdvancedMethods) return { skip: true, message: 'AdvancedMethods not available' };
        const result = AdvancedMethods.doseResponseMA(coffeeDRData, { model: 'spline', knots: 3 });
        return {
            pass: result.knots && result.knots.length === 3 &&
                  result.coefficients.length >= 2,
            message: 'Spline model returns knots and coefficients',
            detail: `knots at doses: ${result.knots ? result.knots.map(k => k.toFixed(1)).join(', ') : 'N/A'}`
        };
    });

    TestRunner.register('DR: Non-linearity test', 'Dose-Response', () => {
        if (!AdvancedMethods || !AdvancedMethods.testNonLinearity) {
            return { skip: true, message: 'testNonLinearity not available' };
        }
        const result = AdvancedMethods.testNonLinearity(coffeeDRData);
        return {
            pass: result.waldTest &&
                  typeof result.waldTest.pvalue === 'number' &&
                  result.waldTest.pvalue >= 0 && result.waldTest.pvalue <= 1,
            message: 'Non-linearity test returns valid p-value',
            detail: `Wald p=${result.waldTest.pvalue.toFixed(4)}, ${result.recommendation}`
        };
    });

    TestRunner.register('DR: Model comparison (AIC)', 'Dose-Response', () => {
        if (!AdvancedMethods || !AdvancedMethods.compareDoseResponseModels) {
            return { skip: true, message: 'compareDoseResponseModels not available' };
        }
        const result = AdvancedMethods.compareDoseResponseModels(coffeeDRData, {
            models: ['linear', 'quadratic', 'spline']
        });
        return {
            pass: result.models.length === 3 &&
                  result.best && result.best.AIC &&
                  result.models.every(m => m.akaikeWeight >= 0 && m.akaikeWeight <= 1),
            message: 'Model comparison returns AIC and Akaike weights',
            detail: `Best: ${result.best.model} (w=${result.best.akaikeWeight.toFixed(3)})`
        };
    });

    TestRunner.register('DR: Fractional polynomial FP1', 'Dose-Response', () => {
        if (!AdvancedMethods || !AdvancedMethods.fractionalPolynomialDR) {
            return { skip: true, message: 'fractionalPolynomialDR not available' };
        }
        // Need to prepare data first
        const drData = coffeeDRData.filter(d => d.dose > 0).map(d => ({
            ...d,
            yi: d.yi,
            vi: d.vi || 0.001
        }));
        if (drData.length < 3) return { skip: true, message: 'Insufficient non-zero dose data' };

        try {
            const result = AdvancedMethods.fractionalPolynomialDR(drData, 'REML', 1);
            return {
                pass: result.powers && result.powers.length === 1 &&
                      result.coefficients && result.coefficients.length >= 1,
                message: 'FP1 selects optimal power',
                detail: `power=${result.powers[0]}, AIC=${result.AIC ? result.AIC.toFixed(2) : 'N/A'}`
            };
        } catch (e) {
            return { pass: false, message: `FP1 error: ${e.message}` };
        }
    });

    TestRunner.register('DR: Greenland-Longnecker covariance', 'Dose-Response', () => {
        if (!AdvancedMethods || !AdvancedMethods.greenlandLongneckerCovariance) {
            return { skip: true, message: 'greenlandLongneckerCovariance not available' };
        }
        // Test with known values
        // For RR: Cov = 1/a0 where a0 = cases in reference
        const cov = AdvancedMethods.greenlandLongneckerCovariance(
            100, 1000,  // refCases, refN
            50, 500,    // cases_i, n_i
            60, 600,    // cases_j, n_j
            'rr'
        );
        const expected = 1/100; // = 0.01
        return {
            pass: Math.abs(cov - expected) < 0.001,
            message: 'GL covariance calculation correct',
            expected: expected,
            actual: cov,
            detail: `Cov = ${cov.toFixed(4)}, expected = ${expected.toFixed(4)}`
        };
    });

    TestRunner.register('DR: Prediction curve generation', 'Dose-Response', () => {
        if (!AdvancedMethods) return { skip: true, message: 'AdvancedMethods not available' };
        const result = AdvancedMethods.doseResponseMA(coffeeDRData, { model: 'linear' });
        return {
            pass: result.predictionCurve &&
                  result.predictionCurve.length > 0 &&
                  result.predictionCurve[0].hasOwnProperty('dose') &&
                  result.predictionCurve[0].hasOwnProperty('effect') &&
                  result.predictionCurve[0].hasOwnProperty('ci'),
            message: 'Prediction curve generated with CIs',
            detail: `${result.predictionCurve.length} points generated`
        };
    });

    TestRunner.register('DR: Plot data helper', 'Dose-Response', () => {
        if (!AdvancedMethods || !AdvancedMethods.getDoseResponsePlotData) {
            return { skip: true, message: 'getDoseResponsePlotData not available' };
        }
        const result = AdvancedMethods.doseResponseMA(coffeeDRData, { model: 'linear' });
        const plotData = AdvancedMethods.getDoseResponsePlotData(result, { nPoints: 50 });
        return {
            pass: plotData.curve && plotData.curve.length >= 50 &&
                  plotData.curve[0].effectLower !== undefined &&
                  plotData.curve[0].effectUpper !== undefined,
            message: 'Plot data includes CI bands',
            detail: `${plotData.curve.length} points with CI bands`
        };
    });

    TestRunner.register('DR: Emax model convergence', 'Dose-Response', () => {
        if (!AdvancedMethods) return { skip: true, message: 'AdvancedMethods not available' };
        try {
            const result = AdvancedMethods.doseResponseMA(coffeeDRData, { model: 'emax' });
            const hasEmax = result.coefficients.some(c => c.name === 'Emax');
            const hasED50 = result.coefficients.some(c => c.name === 'ED50');
            return {
                pass: hasEmax && hasED50,
                message: 'Emax model returns Emax and ED50 parameters',
                detail: `Emax=${result.coefficients[0].estimate.toFixed(3)}, ED50=${result.coefficients[1].estimate.toFixed(3)}`
            };
        } catch (e) {
            return { pass: false, message: `Emax error: ${e.message}` };
        }
    });

    TestRunner.register('DR: Sigmoid model with SEs', 'Dose-Response', () => {
        if (!AdvancedMethods) return { skip: true, message: 'AdvancedMethods not available' };
        try {
            const result = AdvancedMethods.doseResponseMA(coffeeDRData, { model: 'sigmoid' });
            const allHaveSE = result.coefficients.every(c => !isNaN(c.se) && c.se > 0);
            return {
                pass: result.coefficients.length === 4 && allHaveSE,
                message: 'Sigmoid model returns 4 parameters with valid SEs',
                detail: `Hill=${result.coefficients.find(c => c.name === 'Hill')?.estimate.toFixed(3) || 'N/A'}`
            };
        } catch (e) {
            return { pass: false, message: `Sigmoid error: ${e.message}` };
        }
    });

    TestRunner.register('DR: Log-linear model', 'Dose-Response', () => {
        if (!AdvancedMethods) return { skip: true, message: 'AdvancedMethods not available' };
        try {
            const result = AdvancedMethods.doseResponseMA(coffeeDRData, { model: 'loglinear' });
            // Log-linear model: y = beta * log(dose + c)
            const hasSlope = result.coefficients.length === 1 && !isNaN(result.coefficients[0].estimate);
            const hasConstant = result.constant !== undefined;
            return {
                pass: hasSlope && hasConstant && result.modelType === 'loglinear',
                message: 'Log-linear model returns slope and constant',
                detail: `slope=${result.coefficients[0].estimate.toFixed(4)}, constant=${result.constant}`
            };
        } catch (e) {
            return { pass: false, message: `Log-linear error: ${e.message}` };
        }
    });

    TestRunner.register('DR: Piecewise linear model (auto knots)', 'Dose-Response', () => {
        if (!AdvancedMethods) return { skip: true, message: 'AdvancedMethods not available' };
        try {
            const result = AdvancedMethods.doseResponseMA(coffeeDRData, { model: 'piecewise' });
            // Piecewise should have base slope + delta parameters
            const hasKnots = result.knots && result.knots.length > 0;
            const hasSegmentSlopes = result.segmentSlopes && result.segmentSlopes.length > 1;
            return {
                pass: hasKnots && hasSegmentSlopes && result.modelType === 'piecewise',
                message: 'Piecewise model auto-selects optimal knots',
                detail: `${result.knots.length} knot(s) at dose=${result.knots.join(', ')}`
            };
        } catch (e) {
            return { pass: false, message: `Piecewise error: ${e.message}` };
        }
    });

    TestRunner.register('DR: Piecewise with specified knots', 'Dose-Response', () => {
        if (!AdvancedMethods) return { skip: true, message: 'AdvancedMethods not available' };
        try {
            const result = AdvancedMethods.doseResponseMA(coffeeDRData, {
                model: 'piecewise',
                piecewiseKnots: [2, 4]
            });
            const correctKnots = result.knots && result.knots.length === 2 &&
                                result.knots[0] === 2 && result.knots[1] === 4;
            const slopesValid = result.segmentSlopes && result.segmentSlopes.length === 3;
            return {
                pass: correctKnots && slopesValid,
                message: 'Piecewise model respects user-specified knots',
                detail: `3 segments with knots at ${result.knots.join(', ')}`
            };
        } catch (e) {
            return { pass: false, message: `Piecewise knots error: ${e.message}` };
        }
    });

    TestRunner.register('DR: Model comparison includes new models', 'Dose-Response', () => {
        if (!AdvancedMethods) return { skip: true, message: 'AdvancedMethods not available' };
        try {
            const result = AdvancedMethods.compareDoseResponseModels(coffeeDRData, {
                models: ['linear', 'quadratic', 'loglinear', 'piecewise']
            });
            const allModelsPresent = result.models.length === 4;
            const hasAICWeights = result.models.every(m => !isNaN(m.akaikeWeight));
            return {
                pass: allModelsPresent && hasAICWeights,
                message: 'Model comparison includes log-linear and piecewise',
                detail: `Best model: ${result.best.model} (weight=${result.best.akaikeWeight.toFixed(3)})`
            };
        } catch (e) {
            return { pass: false, message: `Model comparison error: ${e.message}` };
        }
    });

    TestRunner.register('DR: Log-linear prediction', 'Dose-Response', () => {
        if (!AdvancedMethods) return { skip: true, message: 'AdvancedMethods not available' };
        try {
            const result = AdvancedMethods.doseResponseMA(coffeeDRData, { model: 'loglinear' });
            // Check prediction curve is generated
            const hasCurve = result.predictionCurve && result.predictionCurve.length > 0;
            // Check curve has expected shape (log function increases then flattens)
            const firstPoint = result.predictionCurve[0];
            const lastPoint = result.predictionCurve[result.predictionCurve.length - 1];
            const hasCI = firstPoint.ci && lastPoint.ci;
            return {
                pass: hasCurve && hasCI,
                message: 'Log-linear model generates prediction curve with CI',
                detail: `${result.predictionCurve.length} points, effect range: ${firstPoint.effect.toFixed(3)} to ${lastPoint.effect.toFixed(3)}`
            };
        } catch (e) {
            return { pass: false, message: `Log-linear prediction error: ${e.message}` };
        }
    });

    TestRunner.register('DR: Piecewise prediction continuity', 'Dose-Response', () => {
        if (!AdvancedMethods) return { skip: true, message: 'AdvancedMethods not available' };
        try {
            const result = AdvancedMethods.doseResponseMA(coffeeDRData, {
                model: 'piecewise',
                piecewiseKnots: [3]
            });
            // Check curve is continuous at knot
            const curve = result.predictionCurve;
            // Find points just before and after knot
            const beforeKnot = curve.find(p => Math.abs(p.dose - 2.9) < 0.2);
            const afterKnot = curve.find(p => Math.abs(p.dose - 3.1) < 0.2);
            const continuous = beforeKnot && afterKnot &&
                              Math.abs(beforeKnot.effect - afterKnot.effect) < 0.1; // Reasonable continuity
            return {
                pass: continuous,
                message: 'Piecewise model maintains continuity at knots',
                detail: `Effect at knot boundary: ${beforeKnot?.effect.toFixed(4)} -> ${afterKnot?.effect.toFixed(4)}`
            };
        } catch (e) {
            return { pass: false, message: `Piecewise continuity error: ${e.message}` };
        }
    });

    // ============================================
    // Bayesian Dose-Response Tests
    // ============================================

    TestRunner.register('Bayesian DR: Linear model', 'Bayesian Dose-Response', () => {
        if (!BayesianMA || !BayesianMA.bayesianDoseResponse) {
            return { skip: true, message: 'BayesianMA.bayesianDoseResponse not available' };
        }
        try {
            const result = BayesianMA.bayesianDoseResponse(coffeeDRData, {
                model: 'linear',
                iterations: 2000,
                burnin: 500,
                chains: 2
            });
            const hasCoef = result.coefficients.length === 1;
            const hasTau = result.tau && !isNaN(result.tau.mean);
            const hasCurve = result.predictionCurve && result.predictionCurve.length > 0;
            return {
                pass: hasCoef && hasTau && hasCurve,
                message: 'Bayesian linear DR returns valid results',
                detail: `slope mean=${result.coefficients[0].mean.toFixed(4)}, tau=${result.tau.mean.toFixed(4)}`
            };
        } catch (e) {
            return { pass: false, message: `Bayesian linear DR error: ${e.message}` };
        }
    });

    TestRunner.register('Bayesian DR: Quadratic model', 'Bayesian Dose-Response', () => {
        if (!BayesianMA || !BayesianMA.bayesianDoseResponse) {
            return { skip: true, message: 'BayesianMA.bayesianDoseResponse not available' };
        }
        try {
            const result = BayesianMA.bayesianDoseResponse(coffeeDRData, {
                model: 'quadratic',
                iterations: 2000,
                burnin: 500,
                chains: 2
            });
            const has2Coefs = result.coefficients.length === 2;
            const hasNames = result.coefficients[0].name === 'linear' &&
                            result.coefficients[1].name === 'quadratic';
            return {
                pass: has2Coefs && hasNames,
                message: 'Bayesian quadratic DR returns 2 coefficients',
                detail: `linear=${result.coefficients[0].mean.toFixed(4)}, quad=${result.coefficients[1].mean.toFixed(4)}`
            };
        } catch (e) {
            return { pass: false, message: `Bayesian quadratic DR error: ${e.message}` };
        }
    });

    TestRunner.register('Bayesian DR: Convergence diagnostics', 'Bayesian Dose-Response', () => {
        if (!BayesianMA || !BayesianMA.bayesianDoseResponse) {
            return { skip: true, message: 'BayesianMA.bayesianDoseResponse not available' };
        }
        try {
            const result = BayesianMA.bayesianDoseResponse(coffeeDRData, {
                model: 'linear',
                iterations: 3000,
                burnin: 1000,
                chains: 2
            });
            const hasDiag = result.diagnostics && result.diagnostics.beta;
            const hasRhat = result.diagnostics.beta[0].rhat !== undefined;
            const hasESS = result.diagnostics.beta[0].ess !== undefined;
            return {
                pass: hasDiag && hasRhat && hasESS,
                message: 'Bayesian DR returns convergence diagnostics',
                detail: `Rhat=${result.diagnostics.beta[0].rhat.toFixed(3)}, ESS=${Math.round(result.diagnostics.beta[0].ess)}`
            };
        } catch (e) {
            return { pass: false, message: `Bayesian DR diagnostics error: ${e.message}` };
        }
    });

    TestRunner.register('Bayesian DR: Posterior probability', 'Bayesian Dose-Response', () => {
        if (!BayesianMA || !BayesianMA.bayesianDoseResponse) {
            return { skip: true, message: 'BayesianMA.bayesianDoseResponse not available' };
        }
        try {
            const result = BayesianMA.bayesianDoseResponse(coffeeDRData, {
                model: 'linear',
                iterations: 2000,
                burnin: 500,
                chains: 2
            });
            const hasProbPos = result.coefficients[0].probPositive !== undefined;
            const hasProbNeg = result.coefficients[0].probNegative !== undefined;
            const probsValid = result.coefficients[0].probPositive + result.coefficients[0].probNegative <= 1.01;
            return {
                pass: hasProbPos && hasProbNeg && probsValid,
                message: 'Bayesian DR calculates posterior probabilities',
                detail: `P(slope>0)=${(result.coefficients[0].probPositive * 100).toFixed(1)}%`
            };
        } catch (e) {
            return { pass: false, message: `Bayesian probability error: ${e.message}` };
        }
    });

    TestRunner.register('Bayesian DR: Credible intervals', 'Bayesian Dose-Response', () => {
        if (!BayesianMA || !BayesianMA.bayesianDoseResponse) {
            return { skip: true, message: 'BayesianMA.bayesianDoseResponse not available' };
        }
        try {
            const result = BayesianMA.bayesianDoseResponse(coffeeDRData, {
                model: 'linear',
                iterations: 2000,
                burnin: 500,
                chains: 2
            });
            const coef = result.coefficients[0];
            const hasCI = coef.ci95 && coef.ci95.lower !== undefined && coef.ci95.upper !== undefined;
            const ciValid = coef.ci95.lower < coef.mean && coef.mean < coef.ci95.upper;
            return {
                pass: hasCI && ciValid,
                message: 'Bayesian DR returns valid 95% credible intervals',
                detail: `95% CI: [${coef.ci95.lower.toFixed(4)}, ${coef.ci95.upper.toFixed(4)}]`
            };
        } catch (e) {
            return { pass: false, message: `Bayesian CI error: ${e.message}` };
        }
    });

    // ============================================
    // Dose-Response Visualization Tests
    // ============================================

    TestRunner.register('DR Viz: doseResponsePlot function exists', 'DR Visualization', () => {
        const hasFunc = typeof Visualization !== 'undefined' &&
                        typeof Visualization.doseResponsePlot === 'function';
        return {
            pass: hasFunc,
            message: hasFunc ? 'doseResponsePlot function is available' : 'doseResponsePlot not found'
        };
    });

    TestRunner.register('DR Viz: doseResponseComparisonPlot exists', 'DR Visualization', () => {
        const hasFunc = typeof Visualization !== 'undefined' &&
                        typeof Visualization.doseResponseComparisonPlot === 'function';
        return {
            pass: hasFunc,
            message: hasFunc ? 'doseResponseComparisonPlot function is available' : 'doseResponseComparisonPlot not found'
        };
    });

    TestRunner.register('DR Viz: Create dose-response plot', 'DR Visualization', () => {
        if (!Visualization || !Visualization.doseResponsePlot || !AdvancedMethods || !AdvancedMethods.doseResponseMA) {
            return { skip: true, message: 'Required functions not available' };
        }
        try {
            const container = document.createElement('div');
            container.style.width = '600px';
            container.style.height = '400px';
            document.body.appendChild(container);

            const result = AdvancedMethods.doseResponseMA(coffeeDRData, 'linear', 'REML');
            const svg = Visualization.doseResponsePlot(container, result, coffeeDRData);

            const hasSvg = svg && svg.nodeName === 'svg';
            const hasPath = container.querySelector('path') !== null;

            document.body.removeChild(container);

            return {
                pass: hasSvg && hasPath,
                message: 'DR plot creates valid SVG with path elements',
                detail: `SVG: ${hasSvg}, Path: ${hasPath}`
            };
        } catch (e) {
            return { pass: false, message: `DR plot error: ${e.message}` };
        }
    });

    TestRunner.register('DR Viz: Plot includes study points', 'DR Visualization', () => {
        if (!Visualization || !Visualization.doseResponsePlot || !AdvancedMethods || !AdvancedMethods.doseResponseMA) {
            return { skip: true, message: 'Required functions not available' };
        }
        try {
            const container = document.createElement('div');
            container.style.width = '600px';
            container.style.height = '400px';
            document.body.appendChild(container);

            const result = AdvancedMethods.doseResponseMA(coffeeDRData, 'linear', 'REML');
            Visualization.doseResponsePlot(container, result, coffeeDRData, { showStudyPoints: true });

            const circles = container.querySelectorAll('circle');
            const hasStudyPoints = circles.length >= coffeeDRData.length;

            document.body.removeChild(container);

            return {
                pass: hasStudyPoints,
                message: 'DR plot includes study data points',
                detail: `Found ${circles.length} circles for ${coffeeDRData.length} data points`
            };
        } catch (e) {
            return { pass: false, message: `DR study points error: ${e.message}` };
        }
    });

    TestRunner.register('DR Viz: Comparison plot with multiple models', 'DR Visualization', () => {
        if (!Visualization || !Visualization.doseResponseComparisonPlot || !AdvancedMethods) {
            return { skip: true, message: 'Required functions not available' };
        }
        try {
            const container = document.createElement('div');
            container.style.width = '600px';
            container.style.height = '400px';
            document.body.appendChild(container);

            const linear = AdvancedMethods.doseResponseMA(coffeeDRData, 'linear', 'REML');
            const quad = AdvancedMethods.doseResponseMA(coffeeDRData, 'quadratic', 'REML');

            const svg = Visualization.doseResponseComparisonPlot(container,
                { linear, quadratic: quad }, coffeeDRData);

            const paths = container.querySelectorAll('path');
            const hasMultiplePaths = paths.length >= 2;

            document.body.removeChild(container);

            return {
                pass: hasMultiplePaths,
                message: 'Comparison plot shows multiple model curves',
                detail: `Found ${paths.length} path elements`
            };
        } catch (e) {
            return { pass: false, message: `Comparison plot error: ${e.message}` };
        }
    });

    // Run all tests
    window.onload = () => TestRunner.run();
    </script>
</body>
